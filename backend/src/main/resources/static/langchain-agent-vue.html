<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI学习助手 - Vue 3</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .chat-header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: #f5f7fa;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input input:focus {
            border-color: #667eea;
        }

        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: transform 0.2s;
        }

        .chat-input button:hover {
            transform: translateY(-2px);
        }

        .chat-input button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            background: #f5f7fa;
            color: #666;
            padding: 12px 16px;
            border-radius: 18px;
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 5px;
            border-bottom-left-radius: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #666;
            border-radius: 50%;
            animation: bounce 1.5s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .info-panel {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #666;
        }

        .info-panel h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .capabilities {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .capability {
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.8rem;
            border: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="chat-container">
            <div class="chat-header">
                <h1>🤖 AI 学习助手</h1>
                <p>基于LangChain4j的智能问答服务</p>
            </div>
            
            <div class="chat-messages" ref="messagesContainer">
                <div class="info-panel">
                    <h3>💡 功能介绍</h3>
                    <p>我是您的专属学习助手，可以帮助您解答学习中遇到的问题，提供学习建议和资源推荐。</p>
                    <div class="capabilities">
                        <div class="capability">课程咨询</div>
                        <div class="capability">学习建议</div>
                        <div class="capability">知识答疑</div>
                        <div class="capability">资源推荐</div>
                    </div>
                </div>
                
                <div v-for="(msg, index) in messages" :key="index" 
                     :class="['message', msg.sender === 'user' ? 'user-message' : 'bot-message']">
                    {{ msg.text }}
                </div>
                
                <div v-if="isTyping" class="typing-indicator">
                    <span>AI正在思考中</span>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            
            <div class="chat-input">
                <input 
                    type="text" 
                    v-model="inputMessage" 
                    placeholder="请输入您的问题..." 
                    @keypress.enter="sendMessage"
                    :disabled="isTyping"
                >
                <button @click="sendMessage" :disabled="isTyping || !inputMessage.trim()">
                    {{ isTyping ? '发送中...' : '发送' }}
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, nextTick, onMounted, computed } = Vue;

        createApp({
            setup() {
                const messages = ref([
                    { sender: 'bot', text: '您好！我是您的AI学习助手，有什么可以帮助您的吗？您可以问我关于课程、学习方法或任何学术问题。' }
                ]);
                const inputMessage = ref('');
                const isTyping = ref(false);
                const messagesContainer = ref(null);

                const scrollToBottom = async () => {
                    await nextTick();
                    if (messagesContainer.value) {
                        messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
                    }
                };

                const sendMessage = async () => {
                    if (!inputMessage.value.trim() || isTyping.value) return;

                    const userMessage = inputMessage.value.trim();
                    messages.value.push({ sender: 'user', text: userMessage });
                    inputMessage.value = '';
                    
                    isTyping.value = true;
                    scrollToBottom();

                    try {
                        // 模拟API调用延迟
                        await new Promise(resolve => setTimeout(resolve, 1000));

                        // 模拟AI回复
                        let botReply = '感谢您的提问！我会尽力为您提供帮助。';
                        
                        if (userMessage.toLowerCase().includes('你好') || userMessage.toLowerCase().includes('您好')) {
                            botReply = '您好！我是您的学习助手，有什么我可以帮助您的吗？';
                        } else if (userMessage.toLowerCase().includes('课程')) {
                            botReply = '我们有丰富的课程资源，包括编程、数学、英语等各个学科。您想了解哪方面的课程呢？您可以告诉我您的兴趣或学习目标，我会为您推荐合适的课程。';
                        } else if (userMessage.toLowerCase().includes('学习') || userMessage.toLowerCase().includes('方法')) {
                            botReply = '学习是一个循序渐进的过程。我建议您：\n1. 制定合理的学习计划\n2. 保持规律的学习习惯\n3. 及时复习巩固知识\n4. 多做练习加深理解\n5. 主动寻求帮助解决疑问';
                        } else if (userMessage.toLowerCase().includes('数学')) {
                            botReply = '数学是一门重要的基础学科。建议您从基础概念开始，逐步深入。可以尝试我们的“高级数学”课程，它涵盖了您需要学习的主要知识点。';
                        } else if (userMessage.toLowerCase().includes('英语')) {
                            botReply = '英语学习需要持续的练习。建议您每天坚持听说读写练习。可以尝试我们的“大学英语”课程，它会帮助您系统提升英语能力。';
                        } else if (userMessage.toLowerCase().includes('编程') || userMessage.toLowerCase().includes('python') || userMessage.toLowerCase().includes('java')) {
                            botReply = '编程是一项实践性很强的技能。建议您从基础语法开始，然后通过项目实践来提升。可以从我们的“Python编程入门”或“Java高级开发”课程开始。';
                        }

                        messages.value.push({ sender: 'bot', text: botReply });
                    } catch (error) {
                        messages.value.push({ 
                            sender: 'bot', 
                            text: '抱歉，我在处理您的问题时遇到了一些困难。请您稍后再试或联系技术支持。' 
                        });
                    } finally {
                        isTyping.value = false;
                        scrollToBottom();
                    }
                };

                onMounted(() => {
                    scrollToBottom();
                });

                return {
                    messages,
                    inputMessage,
                    isTyping,
                    messagesContainer,
                    sendMessage,
                    scrollToBottom
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
