<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评估结果分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .score-summary {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 30px;
            background: #f8f9fa;
            flex-wrap: wrap;
        }
        
        .score-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            min-width: 180px;
        }
        
        .score-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .score-pass {
            color: #28a745;
        }
        
        .score-fail {
            color: #dc3545;
        }
        
        .score-label {
            color: #6c757d;
            font-size: 1.1rem;
        }
        
        .content {
            padding: 30px;
        }
        
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .section h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .capability-chart {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .chart-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .chart-label {
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .chart-bar {
            height: 20px;
            background: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .chart-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
        }
        
        .chart-percentage {
            font-size: 1.2rem;
            font-weight: 700;
            color: #4facfe;
        }
        
        .recommendations {
            display: grid;
            gap: 15px;
        }
        
        .recommendation-item {
            background: #e3f2fd;
            border-left: 4px solid #4facfe;
            padding: 15px;
            border-radius: 0 10px 10px 0;
        }
        
        .recommendation-item h4 {
            color: #1976d2;
            margin-bottom: 8px;
        }
        
        .recommendation-item p {
            color: #2c3e50;
            line-height: 1.5;
        }
        
        .detail-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .detail-table th,
        .detail-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        
        .detail-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .answer-correct {
            color: #28a745;
            font-weight: 600;
        }
        
        .answer-wrong {
            color: #dc3545;
            font-weight: 600;
        }
        
        .analysis-item {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 0 10px 10px 0;
            margin-bottom: 15px;
        }
        
        .analysis-item h4 {
            color: #856404;
            margin-bottom: 8px;
        }
        
        .analysis-item p {
            color: #6c5800;
            line-height: 1.5;
        }
        
        .btn-container {
            text-align: center;
            padding: 30px;
        }
        
        .btn {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 0 10px;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .loading {
            text-align: center;
            padding: 60px 30px;
            color: #6c757d;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 评估结果分析</h1>
            <p>详细了解您的学习能力和知识掌握情况</p>
        </div>
        
        <div class="score-summary" id="scoreSummary">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在生成分析报告...</p>
            </div>
        </div>
        
        <div class="content">
            <!-- 能力分析图表 -->
            <div class="section">
                <h2>📈 能力分析</h2>
                <div class="capability-chart" id="capabilityChart">
                    <!-- 动态生成能力图表 -->
                </div>
            </div>
            
            <!-- 学习建议 -->
            <div class="section">
                <h2>💡 个性化建议</h2>
                <div class="recommendations" id="recommendations">
                    <!-- 动态生成建议 -->
                </div>
            </div>
            
            <!-- 详细答题情况 -->
            <div class="section">
                <h2>📋 答题详情</h2>
                <table class="detail-table" id="detailTable">
                    <thead>
                        <tr>
                            <th>题号</th>
                            <th>题目内容</th>
                            <th>您的答案</th>
                            <th>正确答案</th>
                            <th>得分</th>
                        </tr>
                    </thead>
                    <tbody id="detailBody">
                        <!-- 动态生成答题详情 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 错题分析 -->
            <div class="section">
                <h2>🔍 错题分析</h2>
                <div class="analysis-item">
                    <h4>主要问题</h4>
                    <p>根据您的答题情况，发现以下几个主要问题：</p>
                    <ul style="margin-top: 10px; padding-left: 20px;">
                        <li>基础概念理解不够深入</li>
                        <li>计算准确性有待提高</li>
                        <li>审题仔细程度需要加强</li>
                    </ul>
                </div>
                <div class="analysis-item">
                    <h4>改进建议</h4>
                    <p>针对上述问题，建议采取以下措施：</p>
                    <ol style="margin-top: 10px; padding-left: 20px;">
                        <li>回归课本，夯实基础知识</li>
                        <li>增加练习量，提高熟练度</li>
                        <li>培养仔细读题的习惯</li>
                        <li>建立错题本，定期复习</li>
                    </ol>
                </div>
            </div>
        </div>
        
        <div class="btn-container">
            <button class="btn" onclick="viewHistory()">
                <span>📚</span> 查看历史记录
            </button>
            <button class="btn btn-secondary" onclick="backToMain()">
                <span>🏠</span> 返回主页
            </button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8081/api/assessments';
        const RESULT_ID = new URLSearchParams(window.location.search).get('resultId') || 1;
        
        // 页面加载完成后初始化
        window.onload = function() {
            loadResult();
        };
        
        // 加载评估结果
        async function loadResult() {
            try {
                const response = await fetch(`${API_BASE}/report/${RESULT_ID}`);
                const result = await response.json();
                
                if (result.code === 200) {
                    displayResult(result.data);
                } else {
                    showError('加载结果失败：' + result.message);
                }
            } catch (error) {
                showError('网络错误：' + error.message);
            }
        }
        
        // 显示评估结果
        function displayResult(data) {
            // 显示分数摘要
            displayScoreSummary(data);
            
            // 显示能力图表
            displayCapabilityChart(data);
            
            // 显示学习建议
            displayRecommendations(data);
            
            // 显示答题详情
            displayDetailTable(data);
        }
        
        // 显示分数摘要
        function displayScoreSummary(data) {
            const isPassed = data.isPassed === 1;
            const container = document.getElementById('scoreSummary');
            
            container.innerHTML = `
                <div class="score-card">
                    <div class="score-value ${isPassed ? 'score-pass' : 'score-fail'}">
                        ${data.totalScore}
                    </div>
                    <div class="score-label">总得分</div>
                </div>
                <div class="score-card">
                    <div class="score-value ${isPassed ? 'score-pass' : 'score-fail'}">
                        ${data.scorePercentage}%
                    </div>
                    <div class="score-label">得分率</div>
                </div>
                <div class="score-card">
                    <div class="score-value ${isPassed ? 'score-pass' : 'score-fail'}">
                        ${isPassed ? '✅ 通过' : '❌ 未通过'}
                    </div>
                    <div class="score-label">评估结果</div>
                </div>
                <div class="score-card">
                    <div class="score-value" style="color: #4facfe;">
                        ${new Date(data.generatedTime).toLocaleDateString()}
                    </div>
                    <div class="score-label">评估日期</div>
                </div>
            `;
        }
        
        // 显示能力图表
        function displayCapabilityChart(data) {
            const container = document.getElementById('capabilityChart');
            
            // 模拟能力维度数据
            const capabilities = [
                { name: '逻辑思维', value: 75, color: '#4facfe' },
                { name: '计算能力', value: 68, color: '#00f2fe' },
                { name: '空间想象', value: 82, color: '#43e97b' },
                { name: '数据分析', value: 60, color: '#fa709a' }
            ];
            
            let html = '';
            capabilities.forEach(cap => {
                html += `
                    <div class="chart-item">
                        <div class="chart-label">${cap.name}</div>
                        <div class="chart-bar">
                            <div class="chart-fill" 
                                 style="width: 0%; background: ${cap.color};"
                                 data-target="${cap.value}"></div>
                        </div>
                        <div class="chart-percentage">${cap.value}%</div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // 动画效果
            setTimeout(() => {
                document.querySelectorAll('.chart-fill').forEach(fill => {
                    const target = fill.getAttribute('data-target');
                    fill.style.width = target + '%';
                });
            }, 300);
        }
        
        // 显示学习建议
        function displayRecommendations(data) {
            const container = document.getElementById('recommendations');
            
            // 模拟建议数据
            const suggestions = [
                {
                    title: '加强基础训练',
                    content: '建议每天安排30分钟进行基础概念复习和练习，巩固核心知识点。'
                },
                {
                    title: '提升解题技巧',
                    content: '重点关注解题思路和方法，学会举一反三，提高问题解决能力。'
                },
                {
                    title: '定期自我检测',
                    content: '每周进行一次小测验，及时发现问题并调整学习策略。'
                },
                {
                    title: '寻求专业指导',
                    content: '遇到疑难问题时主动向老师请教，获得针对性的指导和帮助。'
                }
            ];
            
            let html = '';
            suggestions.forEach(suggestion => {
                html += `
                    <div class="recommendation-item">
                        <h4>${suggestion.title}</h4>
                        <p>${suggestion.content}</p>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 显示答题详情表格
        function displayDetailTable(data) {
            const container = document.getElementById('detailBody');
            
            // 模拟答题数据
            const answers = [
                { id: 1, content: '2 + 3 = ?', user: 'B', correct: 'B', score: '5.0' },
                { id: 2, content: '一年有几个季节？', user: 'C', correct: 'C', score: '5.0' },
                { id: 3, content: '太阳从西边升起吗？', user: 'A', correct: 'B', score: '0.0' },
                { id: 4, content: '哪些是水果？（多选）', user: 'A,D', correct: 'A,C', score: '0.0' },
                { id: 5, content: '请写出数字"七"', user: '七', correct: '七', score: '5.0' }
            ];
            
            let html = '';
            answers.forEach(answer => {
                const isCorrect = answer.user === answer.correct;
                html += `
                    <tr>
                        <td>${answer.id}</td>
                        <td style="max-width: 200px;">${answer.content}</td>
                        <td class="${isCorrect ? 'answer-correct' : 'answer-wrong'}">${answer.user}</td>
                        <td>${answer.correct}</td>
                        <td>${answer.score}</td>
                    </tr>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // 查看历史记录
        function viewHistory() {
            window.location.href = 'assessment-system.html';
        }
        
        // 返回主页
        function backToMain() {
            window.location.href = 'index.html';
        }
        
        // 显示错误信息
        function showError(message) {
            document.querySelector('.content').innerHTML = `
                <div class="empty-state">
                    <i>⚠️</i>
                    <h3>加载失败</h3>
                    <p>${message}</p>
                    <button class="btn" onclick="location.reload()" style="margin-top: 20px;">
                        🔄 重新加载
                    </button>
                </div>
            `;
            document.getElementById('scoreSummary').innerHTML = '';
        }
    </script>
</body>
</html>
