<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 智慧教育平台 - 功能测试</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #3498db;
            --primary-dark: #2980b9;
            --secondary-color: #2c3e50;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --light-bg: #f8f9fa;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.1);
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
            padding: 25px;
            transition: var(--transition);
            animation: fadeInUp 0.6s ease-out;
            animation-fill-mode: backwards;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light-bg);
        }

        .card-header i {
            font-size: 1.8rem;
            margin-right: 12px;
            color: var(--primary-color);
        }

        .card-header h3 {
            color: var(--secondary-color);
            font-size: 1.4rem;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.4);
        }

        .btn-success { background: var(--success-color); }
        .btn-success:hover { background: #219653; }

        .btn-warning { background: var(--warning-color); }
        .btn-warning:hover { background: #d48806; }

        .btn-danger { background: var(--danger-color); }
        .btn-danger:hover { background: #c0392b; }

        .form-group {
            margin: 15px 0;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--secondary-color);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .result-container {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            background: var(--light-bg);
            border-left: 4px solid var(--primary-color);
            transition: var(--transition);
        }

        .result-container.loading {
            opacity: 0.7;
        }

        .result-container.success {
            border-left-color: var(--success-color);
            background: #e8f5e9;
        }

        .result-container.error {
            border-left-color: var(--danger-color);
            background: #ffebee;
        }

        .result-content {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            box-shadow: var(--card-shadow);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--success-color);
        }

        .notification.error {
            background: var(--danger-color);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .btn {
                width: 100%;
                margin: 5px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 智慧教育平台</h1>
            <p>API功能测试与管理系统</p>
        </div>
        
        <div class="dashboard">
            <!-- 用户管理卡片 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-users"></i>
                    <h3>用户管理</h3>
                </div>
                
                <div class="button-group">
                    <button class="btn" onclick="getAllUsers()">
                        <i class="fas fa-list"></i> 获取所有用户
                    </button>
                    <button class="btn" onclick="getUserById(1)">
                        <i class="fas fa-user"></i> 获取用户详情
                    </button>
                </div>
                
                <div class="form-group">
                    <label>创建新用户</label>
                    <div class="form-row">
                        <input type="text" id="newUsername" class="form-control" placeholder="用户名" value="testuser">
                        <input type="text" id="newRealName" class="form-control" placeholder="真实姓名" value="测试用户">
                    </div>
                    <div class="form-row">
                        <input type="text" id="newPhone" class="form-control" placeholder="手机号" value="13900139001">
                        <input type="email" id="newEmail" class="form-control" placeholder="邮箱" value="test@example.com">
                    </div>
                    <select id="newUserType" class="form-control">
                        <option value="1">学生</option>
                        <option value="2">教师</option>
                        <option value="3">教务</option>
                        <option value="4">管理员</option>
                    </select>
                    <button class="btn btn-success" onclick="createUser()">
                        <i class="fas fa-plus"></i> 创建用户
                    </button>
                </div>
                
                <div id="userResult" class="result-container">
                    <div class="result-content">等待操作...</div>
                </div>
            </div>

            <!-- 课程管理卡片 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-book"></i>
                    <h3>课程管理</h3>
                </div>
                
                <div class="button-group">
                    <button class="btn" onclick="getAllCourses()">
                        <i class="fas fa-list"></i> 获取所有课程
                    </button>
                    <button class="btn" onclick="getCourseById(1)">
                        <i class="fas fa-book-open"></i> 获取课程详情
                    </button>
                </div>
                
                <div class="form-group">
                    <label>搜索课程</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="searchKeyword" class="form-control" placeholder="输入课程关键词">
                        <button class="btn" onclick="searchCourses()">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                    </div>
                </div>
                
                <div id="courseResult" class="result-container">
                    <div class="result-content">等待操作...</div>
                </div>
            </div>

            <!-- 学习中心卡片 -->
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-graduation-cap"></i>
                    <h3>学习中心</h3>
                </div>
                
                <div class="button-group">
                    <button class="btn btn-warning" onclick="getStudentProgress(3)">
                        <i class="fas fa-chart-line"></i> 学生学习进度
                    </button>
                    <button class="btn btn-warning" onclick="getClassStatistics(1)">
                        <i class="fas fa-chart-bar"></i> 班级统计信息
                    </button>
                </div>
                
                <div class="stats-preview">
                    <div style="background: var(--light-bg); padding: 15px; border-radius: 8px; margin: 15px 0;">
                        <h4 style="margin-bottom: 10px; color: var(--secondary-color);">
                            <i class="fas fa-info-circle"></i> 功能说明
                        </h4>
                        <ul style="padding-left: 20px; color: #666;">
                            <li>查看学生个人学习进度</li>
                            <li>获取班级整体学习统计数据</li>
                            <li>分析学习行为和完成情况</li>
                        </ul>
                    </div>
                </div>
                
                <div id="learningResult" class="result-container">
                    <div class="result-content">等待操作...</div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="notification" class="notification"></div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        
        // 通知系统
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // 加载状态管理
        function setLoading(elementId, isLoading) {
            const container = document.getElementById(elementId);
            if (isLoading) {
                container.classList.add('loading');
                container.innerHTML = `
                    <div style="text-align: center; padding: 20px;">
                        <div class="spinner"></div>
                        <p style="margin-top: 10px;">正在处理...</p>
                    </div>
                `;
            } else {
                container.classList.remove('loading');
            }
        }
        
        // 显示结果
        function showResult(elementId, data, isError = false) {
            const container = document.getElementById(elementId);
            const contentElement = container.querySelector('.result-content') || container;
            
            container.className = `result-container ${isError ? 'error' : 'success'}`;
            contentElement.textContent = JSON.stringify(data, null, 2);
        }
        
        // 通用请求函数
        async function apiRequest(url, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${url}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                return await response.json();
            } catch (error) {
                throw new Error(`网络错误: ${error.message}`);
            }
        }

        // 用户相关函数
        async function getAllUsers() {
            setLoading('userResult', true);
            try {
                const result = await apiRequest('/users');
                showResult('userResult', result);
                showNotification('✅ 用户列表获取成功', 'success');
            } catch (error) {
                showResult('userResult', { error: error.message }, true);
                showNotification('❌ 获取用户列表失败', 'error');
            }
        }

        async function getUserById(id) {
            setLoading('userResult', true);
            try {
                const result = await apiRequest(`/users/${id}`);
                showResult('userResult', result);
                showNotification('✅ 用户详情获取成功', 'success');
            } catch (error) {
                showResult('userResult', { error: error.message }, true);
                showNotification('❌ 获取用户详情失败', 'error');
            }
        }

        async function createUser() {
            setLoading('userResult', true);
            try {
                const userData = {
                    username: document.getElementById('newUsername').value,
                    realName: document.getElementById('newRealName').value,
                    phone: document.getElementById('newPhone').value,
                    email: document.getElementById('newEmail').value,
                    userType: parseInt(document.getElementById('newUserType').value),
                    password: '123456', // 默认密码
                    status: 1
                };

                const result = await apiRequest('/users', {
                    method: 'POST',
                    body: JSON.stringify(userData)
                });
                
                showResult('userResult', result);
                showNotification('✅ 用户创建成功', 'success');
                // 清空表单
                document.getElementById('newUsername').value = '';
                document.getElementById('newRealName').value = '';
                document.getElementById('newPhone').value = '';
                document.getElementById('newEmail').value = '';
                // 刷新用户列表
                setTimeout(getAllUsers, 1500);
            } catch (error) {
                showResult('userResult', { error: error.message }, true);
                showNotification('❌ 创建用户失败', 'error');
            }
        }

        // 课程相关函数
        async function getAllCourses() {
            setLoading('courseResult', true);
            try {
                const result = await apiRequest('/courses');
                showResult('courseResult', result);
                showNotification('✅ 课程列表获取成功', 'success');
            } catch (error) {
                showResult('courseResult', { error: error.message }, true);
                showNotification('❌ 获取课程列表失败', 'error');
            }
        }

        async function getCourseById(id) {
            setLoading('courseResult', true);
            try {
                const result = await apiRequest(`/courses/${id}`);
                showResult('courseResult', result);
                showNotification('✅ 课程详情获取成功', 'success');
            } catch (error) {
                showResult('courseResult', { error: error.message }, true);
                showNotification('❌ 获取课程详情失败', 'error');
            }
        }

        async function searchCourses() {
            setLoading('courseResult', true);
            try {
                const keyword = document.getElementById('searchKeyword').value;
                const result = await apiRequest(`/courses/search?keyword=${encodeURIComponent(keyword)}`);
                showResult('courseResult', result);
                showNotification(`✅ 搜索完成，找到相关课程`, 'success');
            } catch (error) {
                showResult('courseResult', { error: error.message }, true);
                showNotification('❌ 课程搜索失败', 'error');
            }
        }

        // 学习相关函数
        async function getStudentProgress(studentId) {
            setLoading('learningResult', true);
            try {
                const result = await apiRequest(`/learning/student/${studentId}/progress`);
                showResult('learningResult', result);
                showNotification('✅ 学生学习进度获取成功', 'success');
            } catch (error) {
                showResult('learningResult', { error: error.message }, true);
                showNotification('❌ 获取学习进度失败', 'error');
            }
        }

        async function getClassStatistics(classId) {
            setLoading('learningResult', true);
            try {
                const result = await apiRequest(`/learning/class/${classId}/statistics`);
                showResult('learningResult', result);
                showNotification('✅ 班级统计信息获取成功', 'success');
            } catch (error) {
                showResult('learningResult', { error: error.message }, true);
                showNotification('❌ 获取统计信息失败', 'error');
            }
        }

        // 页面加载时自动获取用户列表
        window.onload = function() {
            getAllUsers();
            getAllCourses();
        };
    </script>
</body>
</html>
