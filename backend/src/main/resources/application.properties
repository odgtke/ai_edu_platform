# Server
server.port=8081

# Enable scheduling
spring.task.scheduling.pool.size=5

# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/edu_platform?useUnicode=true&characterEncoding=utf8&useSSL=false
spring.datasource.username=root
spring.datasource.password=

# Redis
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=2000ms
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0

# MyBatis Plus
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=is_deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.not-delete-value=0

# JWT
jwt.secret=mySecretKey
jwt.expiration=86400000

# Paimon configuration
paimon.warehouse.path=./paimon-warehouse

# File Upload
file.upload.path=C:/Users/Administrator/Desktop/物联网项目/AI_code_2026/backend/uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# AI LangChain4j Configuration
langchain4j.openai.api-key=${OPENAI_API_KEY:your_secure_token_123456}
langchain4j.openai.base-url=${OPENAI_BASE_URL:http://113.200.109.142:16050/v1}
langchain4j.openai.model=${OPENAI_MODEL:qwen3}
langchain4j.openai.temperature=${TEMPERATURE:0.3}
langchain4j.openai.top-p=${TOP_P:0.8}
langchain4j.openai.max-tokens=${MAX_TOKENS:500}

# LLM Client Configuration (alternative)
llm.provider=openai
llm.api-key=${OPENAI_API_KEY:your_secure_token_123456}
llm.api-url=${OPENAI_BASE_URL:http://113.200.109.142:16050}/v1/chat/completions
llm.model=${OPENAI_MODEL:qwen3}