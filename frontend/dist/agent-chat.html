<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能助手 - 智慧教育平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 85vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 18px;
            position: relative;
            line-height: 1.5;
        }
        
        .message.user .message-content {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message.agent .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }
        
        .message-info {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: white;
            border-radius: 18px;
            border: 1px solid #e0e0e0;
            margin-bottom: 20px;
            width: fit-content;
        }
        
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
        
        .chat-input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .chat-input:focus {
            border-color: #4facfe;
        }
        
        .send-button {
            padding: 15px 25px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        .send-button:hover {
            transform: translateY(-2px);
        }
        
        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .quick-action {
            padding: 8px 15px;
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-action:hover {
            background: #bbdefb;
            transform: translateY(-2px);
        }
        
        .agent-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #9c27b0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            margin-left: 10px;
            flex-shrink: 0;
        }
        
        .actions-container {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .action-button {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .action-primary {
            background: #4facfe;
            color: white;
        }
        
        .action-secondary {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #ddd;
        }
        
        .action-danger {
            background: #ff4444;
            color: white;
        }
        
        .action-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 智能学习助手</h1>
            <p>随时为您解答学习疑问，推荐合适课程</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message agent">
                <div class="agent-avatar">AI</div>
                <div class="message-content">
                    <div>您好！我是您的智能学习助手，很高兴为您服务 😊</div>
                    <div class="message-info">刚刚</div>
                </div>
            </div>
            
            <div class="quick-actions">
                <div class="quick-action" onclick="sendMessage('如何选择适合的课程？')">如何选课？</div>
                <div class="quick-action" onclick="sendMessage('忘记密码怎么办？')">忘记密码</div>
                <div class="quick-action" onclick="sendMessage('如何查看学习进度？')">学习进度</div>
                <div class="quick-action" onclick="sendMessage('课程可以试听吗？')">课程试听</div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="messageInput" placeholder="请输入您的问题..." onkeypress="handleKeyPress(event)">
            <button class="send-button" id="sendButton" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let sessionId = null;
        let userId = 1; // 示例用户ID
        
        // 页面加载时创建会话
        window.onload = async function() {
            await createSession();
        };
        
        // 创建会话
        async function createSession() {
            try {
                const response = await fetch('/api/agent/session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                
                const result = await response.json();
                if (result.code === 200) {
                    sessionId = result.data.sessionId;
                }
            } catch (error) {
                console.error('创建会话失败:', error);
            }
        }
        
        // 发送消息
        async function sendMessage(message) {
            const input = document.getElementById('messageInput');
            const messageText = message || input.value.trim();
            
            if (!messageText) return;
            
            // 显示用户消息
            addMessage(messageText, 'user');
            input.value = '';
            
            // 显示正在输入指示器
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/agent/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId: userId,
                        sessionId: sessionId,
                        message: messageText
                    })
                });
                
                const result = await response.json();
                
                // 隐藏输入指示器
                hideTypingIndicator();
                
                if (result.code === 200) {
                    displayAgentResponse(result.data);
                } else {
                    addMessage('抱歉，我暂时无法回答您的问题。', 'agent');
                }
                
            } catch (error) {
                hideTypingIndicator();
                console.error('发送消息失败:', error);
                addMessage('网络错误，请稍后再试。', 'agent');
            }
        }
        
        // 显示代理响应
        function displayAgentResponse(response) {
            addMessage(response.content, 'agent');
            
            // 显示动作按钮
            if (response.actions && response.actions.length > 0) {
                displayActions(response.actions);
            }
        }
        
        // 添加消息到聊天界面
        function addMessage(content, sender) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const avatar = document.createElement('div');
            avatar.className = sender === 'user' ? 'user-avatar' : 'agent-avatar';
            avatar.textContent = sender === 'user' ? '我' : 'AI';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = `<div>${content.replace(/\n/g, '<br>')}</div>
                                   <div class="message-info">${getCurrentTime()}</div>`;
            
            if (sender === 'user') {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatar);
            } else {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
            }
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // 显示动作按钮
        function displayActions(actions) {
            const messagesContainer = document.getElementById('chatMessages');
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'actions-container';
            
            actions.forEach(action => {
                const button = document.createElement('button');
                button.className = `action-button action-${action.style || 'secondary'}`;
                button.textContent = action.label;
                button.onclick = () => handleAction(action);
                actionsDiv.appendChild(button);
            });
            
            messagesContainer.appendChild(actionsDiv);
            scrollToBottom();
        }
        
        // 处理动作
        function handleAction(action) {
            switch (action.type) {
                case 'show_help':
                    sendMessage('请介绍一下你能做什么？');
                    break;
                case 'contact_support':
                    alert('请联系客服：400-xxx-xxxx');
                    break;
                case 'related_courses':
                    const keyword = action.params.keyword || '学习';
                    sendMessage(`推荐一些${keyword}相关的课程`);
                    break;
                default:
                    console.log('未知动作:', action);
            }
        }
        
        // 显示正在输入指示器
        function showTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'block';
            scrollToBottom();
        }
        
        // 隐藏正在输入指示器
        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
        }
        
        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }
        
        // 获取当前时间
        function getCurrentTime() {
            const now = new Date();
            return `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        }
        
        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
