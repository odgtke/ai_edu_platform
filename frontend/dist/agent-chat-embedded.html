<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            overflow: hidden;
        }
        
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        
        /* 头部信息 */
        .chat-header {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .agent-avatar {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .agent-info h4 {
            font-size: 1rem;
            margin-bottom: 3px;
        }
        
        .agent-info p {
            font-size: 0.8rem;
            opacity: 0.9;
        }
        
        .agent-status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 快捷操作区 */
        .quick-actions {
            background: white;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }
        
        .quick-action-btn {
            padding: 8px 16px;
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            transition: all 0.3s;
        }
        
        .quick-action-btn:hover {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-color: transparent;
        }
        
        /* 消息区域 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f7fa;
        }
        
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .message.ai .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message.user .message-avatar {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        .message-content {
            max-width: 70%;
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        
        .message.ai .message-bubble {
            background: white;
            color: #1a1a2e;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-bottom-left-radius: 4px;
        }
        
        .message.user .message-bubble {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-time {
            font-size: 0.75rem;
            color: #8892b0;
            margin-top: 5px;
        }
        
        .message.user .message-time {
            text-align: right;
        }
        
        /* 动作按钮 */
        .message-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        
        .action-chip {
            padding: 6px 12px;
            background: #f5f7fa;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .action-chip:hover {
            background: #e3f2fd;
            border-color: #4facfe;
            color: #4facfe;
        }
        
        /* 输入区域 */
        .chat-input-area {
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #f0f0f0;
        }
        
        .input-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .chat-input:focus {
            border-color: #4facfe;
        }
        
        .send-btn {
            width: 45px;
            height: 45px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }
        
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* 打字指示器 */
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            width: fit-content;
        }
        
        .typing-indicator.active {
            display: flex;
            gap: 4px;
        }
        
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #4facfe;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* 欢迎消息 */
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #8892b0;
        }
        
        .welcome-message h3 {
            color: #1a1a2e;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 头部 -->
        <div class="chat-header">
            <div class="agent-avatar">🤖</div>
            <div class="agent-info">
                <h4>智能学习助手</h4>
                <p>随时为您解答学习疑问</p>
            </div>
            <div class="agent-status">
                <span class="status-dot"></span>
                <span>在线</span>
            </div>
        </div>
        
        <!-- 快捷操作 -->
        <div class="quick-actions">
            <button class="quick-action-btn" onclick="sendQuickMessage('如何选课？')">如何选课？</button>
            <button class="quick-action-btn" onclick="sendQuickMessage('忘记密码怎么办？')">忘记密码</button>
            <button class="quick-action-btn" onclick="sendQuickMessage('如何查看学习进度？')">学习进度</button>
            <button class="quick-action-btn" onclick="sendQuickMessage('课程试听')">课程试听</button>
            <button class="quick-action-btn" onclick="sendQuickMessage('推荐适合我的课程')">个性推荐</button>
        </div>
        
        <!-- 消息区域 -->
        <div class="chat-messages" id="chatMessages">
            <div class="message ai">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="message-bubble">
                        您好！我是您的智能学习助手，很高兴为您服务 😊<br><br>
                        我可以帮您：<br>
                        • 解答学习相关问题<br>
                        • 推荐合适的课程<br>
                        • 查询学习进度<br>
                        • 提供学习方法建议<br><br>
                        请问有什么可以帮助您的？
                    </div>
                    <div class="message-time" id="welcomeTime"></div>
                </div>
            </div>
        </div>
        
        <!-- 输入区域 -->
        <div class="chat-input-area">
            <div class="input-container">
                <input type="text" class="chat-input" id="messageInput" 
                       placeholder="请输入您的问题..." 
                       onkeypress="handleKeyPress(event)">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    
    <script>
        const sessionId = generateSessionId();
        let isProcessing = false;
        
        // 生成会话ID
        function generateSessionId() {
            return 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
        
        // 设置欢迎时间
        document.getElementById('welcomeTime').textContent = formatTime(new Date());
        
        // 格式化时间
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }
        
        // 发送快捷消息
        function sendQuickMessage(message) {
            document.getElementById('messageInput').value = message;
            sendMessage();
        }
        
        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || isProcessing) return;
            
            // 添加用户消息
            addMessage(message, 'user');
            input.value = '';
            
            // 显示加载状态
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            showTypingIndicator();
            
            try {
                const response = await fetch('/api/agent/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: 1,
                        sessionId: sessionId,
                        message: message
                    })
                });
                
                const result = await response.json();
                
                // 隐藏加载状态
                hideTypingIndicator();
                
                if (result.code === 200 && result.data) {
                    // 添加AI回复
                    addMessage(result.data.content || result.data.reply || '抱歉，我暂时无法回答您的问题。', 'ai', result.data.actions);
                } else {
                    addMessage('抱歉，服务暂时不可用，请稍后再试。', 'ai');
                }
            } catch (error) {
                console.error('发送消息失败:', error);
                hideTypingIndicator();
                addMessage('网络连接失败，请检查网络后重试。', 'ai');
            } finally {
                isProcessing = false;
                document.getElementById('sendBtn').disabled = false;
            }
        }
        
        // 添加消息到聊天区
        function addMessage(content, type, actions = null) {
            const messagesContainer = document.getElementById('chatMessages');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            const time = formatTime(new Date());
            const avatar = type === 'ai' ? '🤖' : '👤';
            
            let actionsHtml = '';
            if (actions && actions.length > 0) {
                actionsHtml = '<div class="message-actions">' +
                    actions.map(action => 
                        `<button class="action-chip" onclick="handleAction('${action.type}', '${action.value}')">${action.label}</button>`
                    ).join('') +
                    '</div>';
            }
            
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${content.replace(/\n/g, '<br>')}</div>
                    ${actionsHtml}
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // 显示打字指示器
        function showTypingIndicator() {
            const messagesContainer = document.getElementById('chatMessages');
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message ai typing-message';
            typingDiv.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator active">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // 隐藏打字指示器
        function hideTypingIndicator() {
            const typingMessage = document.querySelector('.typing-message');
            if (typingMessage) {
                typingMessage.remove();
            }
        }
        
        // 处理动作按钮点击
        function handleAction(type, value) {
            if (type === 'like') {
                console.log('用户点赞');
            } else if (type === 'dislike') {
                console.log('用户点踩');
            } else if (type === 'view_course') {
                console.log('查看课程:', value);
            } else if (type === 'start_learning') {
                console.log('开始学习:', value);
            }
        }
    </script>
</body>
</html>
