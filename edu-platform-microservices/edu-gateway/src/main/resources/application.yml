server:
  port: 8080

spring:
  application:
    name: edu-gateway
  
  # Redis配置（用于限流）
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 2000ms

  # Nacos配置
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        namespace: public
        group: DEFAULT_GROUP
      config:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yml
        import-check:
          enabled: false
    config:
      import-check:
        enabled: false
    
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # 路由配置（使用Nacos服务发现）
      routes:
        # 用户服务路由
        - id: edu-user-service
          uri: lb://edu-user-service
          predicates:
            - Path=/api/users/**, /api/auth/**, /api/classes/**, /api/grades/**, /api/user-classes/**
          filters:
            - StripPrefix=0

        # 课程服务路由
        - id: edu-course-service
          uri: lb://edu-course-service
          predicates:
            - Path=/api/courses/**, /api/resources/**, /api/recommendations/**
          filters:
            - StripPrefix=0

        # 学习中心服务路由
        - id: edu-learning-service
          uri: lb://edu-learning-service
          predicates:
            - Path=/api/learning/**, /api/assessments/**, /api/analytics/**, /api/assignments/**
          filters:
            - StripPrefix=0

        # 智能体服务路由
        - id: edu-agent-service
          uri: lb://edu-agent-service
          predicates:
            - Path=/api/agent/**
          filters:
            - StripPrefix=0

      # 全局默认过滤器
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      # 跨域配置
      globalcors:
        cors-configurations:
          '[/**]':
            # 使用 allowedOriginPatterns 替代 allowedOrigins，支持通配符且允许 credentials
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

# 日志配置
logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: INFO
    com.alibaba.nacos: INFO
