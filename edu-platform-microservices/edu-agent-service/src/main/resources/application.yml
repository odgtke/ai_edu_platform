server:
  port: 8085

spring:
  application:
    name: edu-agent-service
  
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/edu_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: Pan!0417
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  # Redis配置
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # Nacos配置
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        username: nacos
        password: nacos
        namespace: public
        group: DEFAULT_GROUP
      config:
        enabled: false
        import-check:
          enabled: false
    config:
      import-check:
        enabled: false

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

# LangChain4j配置
langchain4j:
  openai:
    api-key: ${OPENAI_API_KEY:your_secure_token_123456}
    base-url: ${OPENAI_BASE_URL:http://113.200.109.142:16050/v1}
    model: ${OPENAI_MODEL:qwen3}
    temperature: ${TEMPERATURE:0.3}
    top-p: ${TOP_P:0.8}
    max-tokens: ${MAX_TOKENS:500}

# LLM Client配置
llm:
  provider: openai
  api-key: ${OPENAI_API_KEY:your_secure_token_123456}
  api-url: ${OPENAI_BASE_URL:http://113.200.109.142:16050}/v1/chat/completions
  model: ${OPENAI_MODEL:qwen3}

# 日志配置
logging:
  level:
    com.chinaunicom.edu.agent: DEBUG
    com.baomidou.mybatisplus: DEBUG
    dev.langchain4j: INFO
    com.alibaba.nacos: INFO
